<!doctype html>
<html>
  <head>
    <title>Tournament Map</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="navbar__container">
        <a href="#" class="navbar__brand">Beyblade Tournament Map</a>
        <button
          class="navbar__toggle"
          id="navbarToggle"
          aria-label="Toggle navigation"
          aria-controls="navbarMenu"
          aria-expanded="false"
        >
          <span class="bar"></span><span class="bar"></span
          ><span class="bar"></span>
        </button>
        <nav
          id="navbarMenu"
          class="navbar__menu"
          role="navigation"
          aria-labelledby="navbarToggle"
        >
          <ul class="navbar__list">
            <li class="navbar__item">
              <a href="#" class="navbar__link">About</a>
            </li>
            <li class="navbar__item">
              <a href="#" class="navbar__link">Contact</a>
            </li>
            <li class="navbar__item">
              <a href="#" class="navbar__link">FAQ</a>
            </li>
            <li class="navbar__item navbar__item--cta">
              <a href="#" class="navbar__link navbar__link--cta">Support</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <div id="container">
      <div id="sidebar">
        <h2>Find Tournaments</h2>
        <div class="InputContainer">
          <input
            placeholder="Search"
            id="search-bar"
            class="input"
            name="text"
            type="text"
          />
        </div>
        <ul id="tournament-list"></ul>
      </div>
      <div id="map"></div>
    </div>

    <div id="event-modal" class="modal-hidden">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <h3 id="modal-title"></h3>
        <p id="modal-date"></p>
        <a id="modal-link" href="#" target="_blank" rel="noopener"
          >View WBO Post</a
        >
      </div>
    </div>

    <script src="../config.js"></script>
    <script>
      const mapConfig = window.GOOGLE_MAPS_CONFIG || {};

      ((g) => {
        var h,
          a,
          k,
          p = "The Google Maps JavaScript API",
          c = "google",
          l = "importLibrary",
          q = "__ib__",
          m = document,
          b = window;
        b = b[c] || (b[c] = {});
        var d = b.maps || (b.maps = {}),
          r = new Set(),
          e = new URLSearchParams(),
          u = () =>
            h ||
            (h = new Promise(async (f, n) => {
              await (a = m.createElement("script"));
              e.set("libraries", [...r] + "");
              for (k in g)
                e.set(
                  k.replace(/[A-Z]/g, (t) => "_" + t[0].toLowerCase()),
                  g[k],
                );
              e.set("callback", c + ".maps." + q);
              a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
              d[q] = f;
              a.onerror = () => (h = n(Error(p + " could not load.")));
              a.nonce = m.querySelector("script[nonce]")?.nonce || "";
              m.head.append(a);
            }));
        d[l]
          ? console.warn(p + " only loads once. Ignoring:", g)
          : (d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)));
      })(mapConfig);
    </script>
    <script src="script.js"></script>
  </body>
</html>
